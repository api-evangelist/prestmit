aid: prestmit
name: Prestmit
description: >-
  Prestmit is a digital trading platform that lets users buy and sell gift
  cards, exchange cryptocurrencies, pay bills, and purchase airtime and data.
  The Prestmit Partner API enables developers to programmatically buy and sell
  gift cards, manage wallets and payouts, and tap into Prestmits network of
  trusted partners and seamless transactions.
