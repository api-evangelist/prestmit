apis:
  - aid: prestmit:prestmit-partner-api
    name: Prestmit Partner API
    description: >-
      The Prestmit Partner API allows developers to automate the buying and
      selling of gift cards, manage wallet balances and payouts, and integrate
      Prestmit transactions into their own applications. The API supports gift
      card selling and buying, wallet and payout management, account and API
      key administration, and webhook notifications. Endpoints are versioned
      under https://api.prestmit.io/partners/v1 (with a sandbox environment at
      https://dev-api.prestmit.io/partners/v1) and authentication is performed
      using API keys, with optional IP whitelisting.
    humanURL: https://prestmit.io/developers
